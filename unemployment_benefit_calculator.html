<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실업급여 계산기 2026 - 무료 예상 수급액 산출</title>
<meta name="description" content="2026년 최신 상/하한액을 적용하여 고용보험 실업급여 예상액을 즉시 계산해 줍니다.">
<link rel="canonical" href="https://your-domain.com/unemployment_benefit_calculator.html">
<style>
 :root{--primary:#dc2626;--bg:#f5f7fb;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;}
 *{box-sizing:border-box;margin:0;padding:0;}
 body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;align-items:center;padding:24px 16px;}
 header{text-align:center;margin-bottom:24px;}
 header h1{font-size:1.6rem;margin-bottom:6px;}
 header p{color:var(--muted);font-size:0.95rem;}
 .ad-slot{width:100%;max-width:728px;min-height:90px;background:#eef1f6;border:1px dashed #c9cfda;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#9aa3b2;font-size:0.85rem;margin-bottom:20px;}
 .card{background:var(--card);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06);padding:28px 24px;width:100%;max-width:480px;}
 label{display:block;font-size:0.9rem;font-weight:600;margin-bottom:8px;}
 input,select,textarea{width:100%;padding:12px 14px;font-size:1rem;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;background:#fafbfc;font-family:inherit;}
 button{width:100%;padding:14px;font-size:1rem;font-weight:700;color:#fff;background:var(--primary);border:none;border-radius:10px;cursor:pointer;}
 button:hover{opacity:0.9;}
 .result{margin-top:24px;display:none;}
 .result.show{display:block;}
 .result-row{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0;border-bottom:1px solid var(--border);}
 .result-row:last-child{border-bottom:none;}
 .result-label{font-size:0.9rem;color:var(--muted);}
 .result-value{font-size:1.3rem;font-weight:700;color:var(--primary);}
 .info-box{margin-top:24px;width:100%;max-width:480px;background:var(--card);border-radius:12px;padding:18px 20px;font-size:0.85rem;color:var(--muted);line-height:1.6;}
 .site-breadcrumb{width:100%;max-width:728px;display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--muted);margin-bottom:10px;font-family:ui-monospace,'JetBrains Mono',monospace;}
 .site-breadcrumb a{color:var(--muted);text-decoration:none;}
 footer{margin-top:32px;color:var(--muted);font-size:0.8rem;text-align:center;max-width:480px;}
</style>
</head>
<body>
<nav class="site-breadcrumb"><a href="index.html">🏠 생활 계산기 모음</a><span>/</span><span>노동·구직 계산기</span><span>/</span><span>실업급여 계산기</span></nav>
<header>
 <h1>📋 실업급여 계산기</h1>
 <p>2026년 기준 실업급여(구직급여) 예상액 계산</p>
</header>
<div class="ad-slot">광고 영역 (728x90)</div>
<div class="card">
 <label>만 나이</label>
 <input type="number" id="age" placeholder="예: 35">
 <label>고용보험 가입기간 (년)</label>
 <input type="number" id="years" placeholder="예: 5">
 <label>퇴직 전 3개월 1일 평균급여 (원)</label>
 <input type="number" id="dailyWage" placeholder="예: 80000">
 <button onclick="calcUnemp()">계산하기</button>
 <div class="result" id="result">
 <div class="result-row"><span class="result-label">소정급여일수</span><span class="result-value" id="days">-</span></div>
 <div class="result-row"><span class="result-label">1일 구직급여액</span><span class="result-value" id="dayPay">-</span></div>
 <div class="result-row"><span class="result-label">총 예상 수급액</span><span class="result-value" id="totalPay">-</span></div>
 </div>
</div>
<footer>© 2026 실업급여 계산기. <a href="index.html" style="color:var(--primary);font-weight:600;">&larr; 전체 모음 가기</a></footer>
<script src="common_head.js"></script>
<script>
function calcUnemp(){
 const age = parseInt(document.getElementById('age').value);
 const years = parseFloat(document.getElementById('years').value);
 const wage = parseFloat(document.getElementById('dailyWage').value);
 if(!age || !years || !wage) return alert('모두 입력해주세요.');
 
 let days = 120;
 if(years>=1 && years<3) days = age>=50 ? 180 : 150;
 else if(years>=3 && years<5) days = age>=50 ? 210 : 180;
 else if(years>=5 && years<10) days = age>=50 ? 240 : 210;
 else if(years>=10) days = age>=50 ? 270 : 240;
 
 let dayPay = wage * 0.6;
 if(dayPay > 66000) dayPay = 66000;
 if(dayPay < 63104) dayPay = 63104; // 2026 est lower bound
 
 document.getElementById('days').textContent = days + '일';
 document.getElementById('dayPay').textContent = Math.round(dayPay).toLocaleString() + '원';
 document.getElementById('totalPay').textContent = Math.round(dayPay * days).toLocaleString() + '원';
 document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
