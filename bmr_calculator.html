<!DOCTYPE html>
<html lang="ko">
<head>
<head>
<script src="common_head.js"></script>
<title>기초대사량 계산기 - BMR 및 활동대사량 무료 계산</title>
<meta name="description" content="성별, 나이, 신장, 체중을 입력하여 다이어트의 기준이 되는 정확한 기초대사량과 활동대사량을 확인하세요.">
<link rel="canonical" href="https://your-domain.com/bmr_calculator.html">
<style>
 :root{--primary:#16a34a;--bg:#f5f7fb;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;}
 *{box-sizing:border-box;margin:0;padding:0;}
 body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;align-items:center;padding:24px 16px;}
 header{text-align:center;margin-bottom:24px;}
 header h1{font-size:1.6rem;margin-bottom:6px;}
 header p{color:var(--muted);font-size:0.95rem;}
 .ad-slot{width:100%;max-width:728px;min-height:90px;background:#eef1f6;border:1px dashed #c9cfda;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#9aa3b2;font-size:0.85rem;margin-bottom:20px;}
 .card{background:var(--card);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06);padding:28px 24px;width:100%;max-width:480px;}
 label{display:block;font-size:0.9rem;font-weight:600;margin-bottom:8px;}
 input,select,textarea{width:100%;padding:12px 14px;font-size:1rem;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;background:#fafbfc;font-family:inherit;}
 button{width:100%;padding:14px;font-size:1rem;font-weight:700;color:#fff;background:var(--primary);border:none;border-radius:10px;cursor:pointer;}
 button:hover{opacity:0.9;}
 .result{margin-top:24px;display:none;}
 .result.show{display:block;}
 .result-row{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0;border-bottom:1px solid var(--border);}
 .result-row:last-child{border-bottom:none;}
 .result-label{font-size:0.9rem;color:var(--muted);}
 .result-value{font-size:1.3rem;font-weight:700;color:var(--primary);}
 .info-box{margin-top:24px;width:100%;max-width:480px;background:var(--card);border-radius:12px;padding:18px 20px;font-size:0.85rem;color:var(--muted);line-height:1.6;}
 .site-breadcrumb{width:100%;max-width:728px;display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--muted);margin-bottom:10px;font-family:ui-monospace,'JetBrains Mono',monospace;}
 .site-breadcrumb a{color:var(--muted);text-decoration:none;}
 footer{margin-top:32px;color:var(--muted);font-size:0.8rem;text-align:center;max-width:480px;}
</style>
</head>
<body>
<nav class="site-breadcrumb"><a href="index.html">🏠 생활 계산기 모음</a><span>/</span><span>건강 도구</span><span>/</span><span>기초대사량 계산기</span></nav>
<header>
 <h1>🔥 기초대사량 계산기</h1>
 <p>Mifflin-St Jeor 공식 기반 BMR 산출</p>
</header>
<div class="ad-slot">광고 영역 (728x90)</div>
<div class="card">
 <label>성별</label>
 <select id="gender"><option value="m">남성</option><option value="f">여성</option></select>
 <label>나이 (만)</label>
 <input type="number" id="bmrAge" placeholder="예: 35">
 <label>키 (cm)</label>
 <input type="number" id="bmrHeight" placeholder="예: 175">
 <label>몸무게 (kg)</label>
 <input type="number" id="bmrWeight" placeholder="예: 70">
 <button onclick="calcBMR()">기초대사량 계산하기</button>
 <div class="result" id="result">
 <div class="result-row"><span class="result-label">기초대사량 (Mifflin-St Jeor)</span><span class="result-value" id="bmrValue">-</span></div>
 <div class="result-row"><span class="result-label">활동 대사량 (보통 활동 기준)</span><span class="result-value" id="tdeeValue" style="color:#10b981;font-size:1.1rem;">-</span></div>
 </div>
</div>
<footer>© 2026 기초대사량 계산기. <a href="index.html" style="color:var(--primary);font-weight:600;">&larr; 전체 모음 가기</a></footer>
<script src="common_head.js"></script>
<script>
function calcBMR(){
 const g = document.getElementById('gender').value;
 const a = parseFloat(document.getElementById('bmrAge').value);
 const h = parseFloat(document.getElementById('bmrHeight').value);
 const w = parseFloat(document.getElementById('bmrWeight').value);
 if(!a || !h || !w) return alert('모두 입력해주세요.');

 let bmr = 10 * w + 6.25 * h - 5 * a;
 bmr = g === 'm' ? bmr + 5 : bmr - 161;

 document.getElementById('bmrValue').textContent = Math.round(bmr).toLocaleString() + ' kcal';
 document.getElementById('tdeeValue').textContent = Math.round(bmr * 1.55).toLocaleString() + ' kcal';
 document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
