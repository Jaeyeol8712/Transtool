<header>
  <h1>🎱 로또 번호 생성기</h1>
  <p>1~45 중 무작위 6개 번호를 생성합니다</p>
</header>

<div class="ad-slot">광고 영역 (728x90)</div>

<div class="card">
  <div class="controls">
    <div>
      <label for="setCount">생성할 게임 수</label>
      <select id="setCount">
        <option value="1">1게임</option>
        <option value="5" selected>5게임</option>
        <option value="10">10게임</option>
      </select>
    </div>
    <button onclick="generateLotto()">번호 생성</button>
  </div>

  <div class="sets" id="sets"></div>
</div>

<footer>© 2026 로또 번호 생성기. 실제 당첨을 보장하지 않으며 재미로 이용해주세요. <a href="index.html" style="color:#eab308;font-weight:600;">&larr; 전체 계산기 모음 보러가기</a></footer>

<script>
function ballColor(n){
  if(n <= 10) return '#fbbf24';
  if(n <= 20) return '#3b82f6';
  if(n <= 30) return '#ef4444';
  if(n <= 40) return '#6b7280';
  return '#10b981';
}

function generateOneSet(){
  const nums = new Set();
  while(nums.size < 6){
    nums.add(Math.floor(Math.random()*45)+1);
  }
  return Array.from(nums).sort((a,b)=>a-b);
}

function generateLotto(){
  const count = parseInt(document.getElementById('setCount').value);
  const container = document.getElementById('sets');
  container.innerHTML = '';

  for(let i=1; i<=count; i++){
    const nums = generateOneSet();
    const row = document.createElement('div');
    row.className = 'set-row';
    const label = document.createElement('div');
    label.className = 'set-label';
    label.textContent = 'GAME '+i;
    const balls = document.createElement('div');
    balls.className = 'balls';
    nums.forEach(n=>{
      const ball = document.createElement('div');
      ball.className = 'ball';
      ball.style.background = ballColor(n);
      ball.textContent = n;
      balls.appendChild(ball);
    });
    row.appendChild(label);
    row.appendChild(balls);
    container.appendChild(row);
  }
}

generateLotto();
</script>
