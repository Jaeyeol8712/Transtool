<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTV 계산기 - 주택담보인정비율 무료 계산</title>
<meta name="description" content="주택 가격과 기존 대출을 바탕으로 추가로 받을 수 있는 주택담보대출 한도 비율(LTV)을 계산합니다.">
<link rel="canonical" href="https://your-domain.com/ltv_calculator.html">
<style>
 :root{--primary:#0284c7;--bg:#f5f7fb;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;}
 *{box-sizing:border-box;margin:0;padding:0;}
 body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;align-items:center;padding:24px 16px;}
 header{text-align:center;margin-bottom:24px;}
 header h1{font-size:1.6rem;margin-bottom:6px;}
 header p{color:var(--muted);font-size:0.95rem;}
 .ad-slot{width:100%;max-width:728px;min-height:90px;background:#eef1f6;border:1px dashed #c9cfda;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#9aa3b2;font-size:0.85rem;margin-bottom:20px;}
 .card{background:var(--card);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06);padding:28px 24px;width:100%;max-width:480px;}
 label{display:block;font-size:0.9rem;font-weight:600;margin-bottom:8px;}
 input,select,textarea{width:100%;padding:12px 14px;font-size:1rem;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;background:#fafbfc;font-family:inherit;}
 button{width:100%;padding:14px;font-size:1rem;font-weight:700;color:#fff;background:var(--primary);border:none;border-radius:10px;cursor:pointer;}
 button:hover{opacity:0.9;}
 .result{margin-top:24px;display:none;}
 .result.show{display:block;}
 .result-row{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0;border-bottom:1px solid var(--border);}
 .result-row:last-child{border-bottom:none;}
 .result-label{font-size:0.9rem;color:var(--muted);}
 .result-value{font-size:1.3rem;font-weight:700;color:var(--primary);}
 .info-box{margin-top:24px;width:100%;max-width:480px;background:var(--card);border-radius:12px;padding:18px 20px;font-size:0.85rem;color:var(--muted);line-height:1.6;}
 .site-breadcrumb{width:100%;max-width:728px;display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--muted);margin-bottom:10px;font-family:ui-monospace,'JetBrains Mono',monospace;}
 .site-breadcrumb a{color:var(--muted);text-decoration:none;}
 footer{margin-top:32px;color:var(--muted);font-size:0.8rem;text-align:center;max-width:480px;}
</style>
</head>
<body>
<nav class="site-breadcrumb"><a href="index.html">🏠 생활 계산기 모음</a><span>/</span><span>부동산 계산기</span><span>/</span><span>LTV 계산기</span></nav>
<header>
 <h1>🏠 LTV 계산기</h1>
 <p>주택담보인정비율 계산</p>
</header>
<div class="ad-slot">광고 영역 (728x90)</div>
<div class="card">
 <label>주택 평가 가격 (원)</label>
 <input type="number" id="housePrice" placeholder="예: 500000000">
 <label>선순위 채권 및 임대보증금 (원)</label>
 <input type="number" id="priorDebt" placeholder="예: 50000000" value="0">
 <label>신규 대출 신청 금액 (원)</label>
 <input type="number" id="newLoanAmt" placeholder="예: 250000000">
 <button onclick="calcLTV()">LTV 계산하기</button>
 <div class="result" id="result">
 <div class="result-row"><span class="result-label">나의 LTV</span><span class="result-value" id="ltvValue">-</span></div>
 <div class="result-row"><span class="result-label">일반적 규제(70%) 충족</span><span class="result-value" id="ltvStatus" style="font-size:1.1rem;">-</span></div>
 </div>
</div>
<footer>© 2026 LTV 계산기. <a href="index.html" style="color:var(--primary);font-weight:600;">&larr; 전체 모음 가기</a></footer>
<script src="common_head.js"></script>
<script>
function calcLTV(){
 const hp = parseFloat(document.getElementById('housePrice').value);
 const pd = parseFloat(document.getElementById('priorDebt').value) || 0;
 const nl = parseFloat(document.getElementById('newLoanAmt').value);
 if(!hp || !nl) return alert('주택가격과 신규대출금을 입력해주세요.');
 
 const ltv = ((pd + nl) / hp) * 100;
 document.getElementById('ltvValue').textContent = ltv.toFixed(2) + '%';
 const statusEl = document.getElementById('ltvStatus');
 if(ltv <= 70){
 statusEl.textContent = '충족 (지역별 규제 확인 필요)';
 statusEl.style.color = '#10b981';
 } else {
 statusEl.textContent = '초과 (70% 기준)';
 statusEl.style.color = '#ef4444';
 }
 document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
