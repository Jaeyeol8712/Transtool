<header>
  <h1>🔲 QR코드 생성기</h1>
  <p>URL이나 텍스트를 입력하면 즉시 QR코드를 만들어드립니다</p>
</header>

<div class="ad-slot">광고 영역 (728x90)</div>

<div class="card">
  <label for="qrText">URL 또는 텍스트</label>
  <input type="text" id="qrText" placeholder="https://example.com">
  <label for="qrSize">크기</label>
  <select id="qrSize">
    <option value="200">작게 (200px)</option>
    <option value="300" selected>보통 (300px)</option>
    <option value="400">크게 (400px)</option>
  </select>
  <button onclick="generateQR()">QR코드 생성</button>

  <div id="qrcode"></div>
  <button class="secondary" id="downloadBtn" style="display:none;" onclick="downloadQR()">이미지로 다운로드</button>
</div>

<footer>© 2026 QR코드 생성기. 생성된 QR코드는 브라우저에서 즉시 만들어지며 서버에 저장되지 않습니다. <a href="index.html" style="color:#111827;font-weight:600;">&larr; 전체 계산기 모음 보러가기</a></footer>

<script>
let qrInstance = null;

function generateQR(){
  const text = document.getElementById('qrText').value.trim();
  const size = parseInt(document.getElementById('qrSize').value);
  const container = document.getElementById('qrcode');

  if(!text){ alert('URL 또는 텍스트를 입력해주세요.'); return; }

  container.innerHTML = '';
  qrInstance = new QRCode(container, {
    text: text,
    width: size,
    height: size,
    colorDark: '#111827',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  document.getElementById('downloadBtn').style.display = 'block';
}

function downloadQR(){
  const container = document.getElementById('qrcode');
  const img = container.querySelector('img');
  const canvas = container.querySelector('canvas');

  const link = document.createElement('a');
  link.download = 'qrcode.png';
  if(img && img.src){
    link.href = img.src;
  } else if(canvas){
    link.href = canvas.toDataURL('image/png');
  } else {
    return;
  }
  link.click();
}
</script>
