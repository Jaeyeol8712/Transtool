<nav class="site-breadcrumb"><a href="index.html">🏠 생활 계산기 모음</a><span>/</span><span>텍스트 도구</span><span>/</span><span>글자수 세기</span><span class="tool-code">TEXT-01</span></nav>

<header>
  <h1>🔢 글자수 세기</h1>
  <p>자기소개서, 블로그, SNS 글자수를 실시간으로 계산합니다</p>
</header>

<div class="ad-slot">광고 영역 (728x90)</div>

<div class="card">
  <div class="toolbar">
    <span style="font-size:0.85rem;color:var(--muted);">아래에 텍스트를 입력하세요</span>
    <button onclick="clearText()">전체 지우기</button>
  </div>
  <textarea id="textInput" oninput="updateStats()" placeholder="여기에 텍스트를 입력하거나 붙여넣으세요..."></textarea>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-value" id="charWithSpace">0</div>
      <div class="stat-label">공백 포함 글자수</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="charNoSpace">0</div>
      <div class="stat-label">공백 제외 글자수</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="wordCount">0</div>
      <div class="stat-label">단어수</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="sentenceCount">0</div>
      <div class="stat-label">문장수</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="lineCount">0</div>
      <div class="stat-label">줄수</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="byteCount">0</div>
      <div class="stat-label">바이트 (UTF-8)</div>
    </div>
  </div>
</div>

<footer>© 2026 글자수 세기. 입력한 내용은 서버로 전송되지 않으며 브라우저에서만 처리됩니다. <a href="index.html" style="color:#ea580c;font-weight:600;">&larr; 전체 계산기 모음 보러가기</a></footer>

<script>
function updateStats(){
  const text = document.getElementById('textInput').value;

  const charWithSpace = text.length;
  const charNoSpace = text.replace(/\s/g, '').length;
  const words = text.trim() === '' ? [] : text.trim().split(/\s+/);
  const sentences = text.split(/[.!?。！？]+/).filter(s => s.trim().length > 0);
  const lines = text === '' ? 0 : text.split('\n').length;
  const byteCount = new TextEncoder().encode(text).length;

  document.getElementById('charWithSpace').textContent = charWithSpace.toLocaleString();
  document.getElementById('charNoSpace').textContent = charNoSpace.toLocaleString();
  document.getElementById('wordCount').textContent = words.length.toLocaleString();
  document.getElementById('sentenceCount').textContent = sentences.length.toLocaleString();
  document.getElementById('lineCount').textContent = lines.toLocaleString();
  document.getElementById('byteCount').textContent = byteCount.toLocaleString();
}

function clearText(){
  document.getElementById('textInput').value = '';
  updateStats();
}
</script>
