<!DOCTYPE html>
<html lang="ko">
<head>
<script src="common_head.js"></script>
<title>부동산 취득세 계산기 - 1주택/상가 세금 모의계산</title>
<meta name="description" content="주택, 아파트, 상가 매매 시 발생하는 취득세와 지방교육세, 농어촌특별세를 간편하게 계산해 줍니다.">
<link rel="canonical" href="https://www.aroundtool.com/acquisition_tax_calculator.html">
<style>
 :root{--primary:#d97706;--bg:#f5f7fb;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;}
 *{box-sizing:border-box;margin:0;padding:0;}
 body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;align-items:center;padding:24px 16px;}
 header{text-align:center;margin-bottom:24px;}
 header h1{font-size:1.6rem;margin-bottom:6px;}
 header p{color:var(--muted);font-size:0.95rem;}
 .ad-slot{width:100%;max-width:728px;min-height:90px;background:#eef1f6;border:1px dashed #c9cfda;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#9aa3b2;font-size:0.85rem;margin-bottom:20px;}
 .card{background:var(--card);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06);padding:28px 24px;width:100%;max-width:480px;}
 label{display:block;font-size:0.9rem;font-weight:600;margin-bottom:8px;}
 input,select,textarea{width:100%;padding:12px 14px;font-size:1rem;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;background:#fafbfc;font-family:inherit;}
 button{width:100%;padding:14px;font-size:1rem;font-weight:700;color:#fff;background:var(--primary);border:none;border-radius:10px;cursor:pointer;}
 button:hover{opacity:0.9;}
 .result{margin-top:24px;display:none;}
 .result.show{display:block;}
 .result-row{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0;border-bottom:1px solid var(--border);}
 .result-row:last-child{border-bottom:none;}
 .result-label{font-size:0.9rem;color:var(--muted);}
 .result-value{font-size:1.3rem;font-weight:700;color:var(--primary);}
 .info-box{margin-top:24px;width:100%;max-width:480px;background:var(--card);border-radius:12px;padding:18px 20px;font-size:0.85rem;color:var(--muted);line-height:1.6;}
 .site-breadcrumb{width:100%;max-width:728px;display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--muted);margin-bottom:10px;font-family:ui-monospace,'JetBrains Mono',monospace;}
 .site-breadcrumb a{color:var(--muted);text-decoration:none;}
 footer{margin-top:32px;color:var(--muted);font-size:0.8rem;text-align:center;max-width:480px;}
</style>
</head>
<body>
<nav class="site-breadcrumb"><a href="index.html">🏠 생활 계산기 모음</a><span>/</span><span>부동산 계산기</span><span>/</span><span>취득세 계산기</span></nav>
<header>
 <h1>📄 취득세 계산기</h1>
 <p>부동산 매매 시 취득세 및 부가세 계산</p>
</header>
<div class="ad-slot">광고 영역 (728x90)</div>
<div class="card">
 <label>부동산 종류</label>
 <select id="propType">
 <option value="house">주택(아파트 등)</option>
 <option value="other">상가/토지/오피스텔</option>
 </select>
 <label>매매 대금 (원)</label>
 <input type="number" id="buyPrice" placeholder="예: 600000000">
 <label>전용면적</label>
 <select id="areaSize">
 <option value="small">85㎡ 이하</option>
 <option value="large">85㎡ 초과</option>
 </select>
 <button onclick="calcTax()">취득세 계산하기</button>
 <div class="result" id="result">
 <div class="result-row"><span class="result-label">세율</span><span class="result-value" id="taxRate" style="font-size:1.1rem;">-</span></div>
 <div class="result-row"><span class="result-label">예상 세액 합계</span><span class="result-value" id="totalTax">-</span></div>
 </div>
</div>
<footer>© 2026 취득세 계산기. <a href="index.html" style="color:var(--primary);font-weight:600;">&larr; 전체 모음 가기</a></footer>
<script src="common_head.js"></script>
<script>
function calcTax(){
 const type = document.getElementById('propType').value;
 const price = parseFloat(document.getElementById('buyPrice').value);
 const area = document.getElementById('areaSize').value;
 if(!price) return alert('매매 대금을 입력해주세요.');

 let taxPercent = 0;
 let eduPercent = 0.1;
 let farmPercent = area === 'small' ? 0 : 0.2;

 if(type === 'other'){
 taxPercent = 4.0;
 eduPercent = 0.4;
 farmPercent = 0.2;
 } else { // house, 1주택 기준 간소화
 if(price <= 600000000) taxPercent = 1.0;
 else if(price <= 900000000) taxPercent = (price*2/300000000 - 3).toFixed(2);
 else taxPercent = 3.0;
 }

 const totalRate = parseFloat(taxPercent) + eduPercent + farmPercent;
 const totalTax = price * (totalRate / 100);

 document.getElementById('taxRate').textContent = `총 ${totalRate.toFixed(2)}% (취득세 ${taxPercent}%)`;
 document.getElementById('totalTax').textContent = Math.round(totalTax).toLocaleString() + '원';
 document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
